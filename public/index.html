<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URL Shortener</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
      background-color: #f4f4f4;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .container {
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    #result {
      margin-top: 20px;
      padding: 12px;
      background-color: #e9f7ef;
      border-radius: 4px;
      word-wrap: break-word;
      display: none;
    }
    #result a {
      color: #007bff;
      font-weight: bold;
    }
    .error {
      background-color: #fdecea !important;
      color: #b71c1c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>
    <input type="text" id="urlInput" placeholder="Enter your long URL here...">
    <button onclick="shortenUrl()">Shorten URL</button>
    <div id="result"></div>
  </div>

  <script>
    async function shortenUrl() {
      const urlInput = document.getElementById('urlInput');
      const resultDiv = document.getElementById('result');
      const longUrl = urlInput.value.trim();

      if (!longUrl) {
        resultDiv.className = 'error';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = 'Please enter a URL';
        return;
      }

      try {
        const response = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ original_url: longUrl })
        });

        const data = await response.json();

        if (!response.ok) {
          resultDiv.className = 'error';
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = data.error || 'Something went wrong';
          return;
        }

        resultDiv.className = '';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `Short URL: <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;

      } catch (error) {
        resultDiv.className = 'error';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = 'Server error, please try again';
      }
    }
  </script>
</body>
</html>
